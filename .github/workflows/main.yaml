name: Java CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  java_build:
    strategy:
      max-parallel: 1
      matrix:
        java_version: [ 17, 21, 25 ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK ${{ matrix.java_version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: ${{ matrix.java_version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama
          key: ollama-models-${{ runner.os }}-phi-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ollama-models-${{ runner.os }}-

      - name: Check Ollama cache size
        run: |
          if [ -d ~/.ollama ]; then
            SIZE=$(du -sh ~/.ollama 2>/dev/null | cut -f1)
            SIZE_BYTES=$(du -sb ~/.ollama 2>/dev/null | cut -f1)
            echo "Ollama cache size: $SIZE ($SIZE_BYTES bytes)"
            # 10GB = 10737418240 bytes
            if [ "$SIZE_BYTES" -gt 10737418240 ]; then
              echo "WARNING: Cache exceeds 10GB GitHub Actions limit."
            fi
          else
            echo "No Ollama cache directory found (will be created after first run)"
          fi

      - name: Build with JDK ${{ matrix.java_version }}
        run: mvn -U -B --fail-at-end clean install #-DskipOllamaITs
        env:
          LC4J_GLOBAL_TEST_RETRY_ENABLED: true
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT }}
          AZURE_SEARCH_KEY: ${{ secrets.AZURE_SEARCH_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_GEMINI_API_KEY: ${{secrets.GOOGLE_AI_GEMINI_API_KEY}}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}

      - name: License Compliance
        run: mvn -U -B -P compliance org.honton.chas:license-maven-plugin:compliance
